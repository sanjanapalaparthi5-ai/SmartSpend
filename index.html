<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSpend Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#0f172a;
        }

        .login-box{
            width:350px;
            background:#1e293b;
            padding:40px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 0 20px #38bdf8;
        }

        .login-box h1{
            color:#38bdf8;
            margin-bottom:30px;
        }

        .login-box input{
            width:100%;
            padding:15px;
            margin:10px 0;
            border:none;
            border-radius:10px;
            background:#0f172a;
            color:white;
        }

        .login-box button{
            width:100%;
            padding:15px;
            margin-top:20px;
            border:none;
            border-radius:10px;
            background:#38bdf8;
            color:black;
            font-weight:bold;
            cursor:pointer;
        }

    </style>

</head>
<body>

<div class="login-box">

    <h1>💰 SmartSpend</h1>

    <input type="text" placeholder="Enter Username">

    <input type="password" placeholder="Enter Password">

    <button onclick="login()">Login</button>

</div>

<script>

function login(){

    window.location.href = "dashboard.html";
}

</script>

</body>
</html>
